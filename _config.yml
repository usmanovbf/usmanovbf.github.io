theme: jekyll-theme-chirpy
baseurl: ''
lang: en
timezone: Europe/Istanbul
title: Bulat Usmanov
tagline: 'Solutions Architecture, Software Engineering, etc.'
description: 'Solutions Architecture, Software Engineering, etc.'
url: 'https://usmanovbf.github.io'
github:
  username: usmanovbf
twitter:
  username: usmanovbf
social:
  name: Bulat Usmanov
  email: mailbox.for.profitable.work@gmail.com
  links:
    - 'https://twitter.com/usmanovbf'
    - 'https://github.com/usmanovbf'
    - 'https://www.linkedin.com/in/usmanovbulat'
google_site_verification: null
google_analytics:
  id: null
  pv:
    proxy_endpoint: null
    cache_path: null
theme_mode: null
img_cdn: null
avatar: 'https://ca.slack-edge.com/ERXBAD0AX-U03UM3N6ZPY-19f750d9c188-512'
toc: true
comments:
  active: null
  disqus:
    shortname: null
  utterances:
    repo: null
    issue_term: null
  giscus:
    repo: null
    repo_id: null
    category: null
    category_id: null
    mapping: null
    input_position: null
    lang: null
    reactions_enabled: null
assets:
  self_host:
    enabled: null
    env: null
pwa:
  enabled: true
paginate: 10
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: 'true'
    block:
      line_numbers: true
      start_line: 1
collections:
  tabs:
    output: true
    sort_by: order
defaults:
  - scope:
      path: ''
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: '/posts/:title/'
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ''
      type: tabs
    values:
      layout: page
      permalink: '/:title/'
  - scope:
      path: assets/img/favicons
    values:
      swcache: true
  - scope:
      path: assets/js/dist
    values:
      swcache: true
sass:
  style: compressed
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs:
      - development
exclude:
  - '*.gem'
  - '*.gemspec'
  - tools
  - README.md
  - CHANGELOG.md
  - LICENSE
  - gulpfile.js
  - node_modules
  - package*.json
  - .idea
  - '*.iml'
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: '/tags/:name/'
    category: '/categories/:name/'

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - amp-jekyll
  - jekyll-gist
